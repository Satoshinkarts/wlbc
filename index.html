<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WLBC Store</title>
    <meta name="description" content="WLBC Store — Browse products, place orders, and track deliveries" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#1a8cff" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="WLBC Store" />
    <meta property="og:description" content="WLBC Store — Browse products, place orders, and track deliveries" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove stray text nodes from body (build artifacts)
      document.addEventListener('DOMContentLoaded', function() {
        Array.from(document.body.childNodes).forEach(function(n) {
          if (n.nodeType === 3 && n.textContent.trim()) n.remove();
        });
      });
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
